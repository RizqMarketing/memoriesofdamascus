<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betaling — Memories of Damascus</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<style>
  :root {
    --ink:#160808; --gold:#c9942a; --gold-lt:#e8c46a;
    --cream:#f5edd6; --muted:#c4b49a;
    --terracotta:#b85c38;
    --font-heading:'Cormorant Garamond',Georgia,serif;
    --font-body:'Inter',system-ui,sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--ink);color:var(--cream);font-family:var(--font-body);min-height:100vh}
  .wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
  .icon{font-size:3rem;margin-bottom:1rem;color:var(--gold-lt)}
  h1{font-family:var(--font-heading);font-weight:400;font-size:clamp(1.6rem,4vw,2.6rem);color:var(--cream);margin-bottom:1rem}
  h1 em{color:var(--gold-lt);font-style:italic}
  p{color:var(--muted);max-width:520px;margin-bottom:2rem;line-height:1.7}
  .btn{display:inline-block;padding:.9rem 2rem;border:1px solid var(--gold);color:var(--gold-lt);text-decoration:none;font-size:.85rem;letter-spacing:.16em;text-transform:uppercase;transition:all .2s;font-family:var(--font-body)}
  .btn:hover{background:var(--gold);color:var(--ink)}
  .status-wrap{padding:2rem;background:rgba(201,148,42,.05);border:1px solid rgba(201,148,42,.2);border-radius:8px;max-width:520px}
</style>
</head>
<body>
<div class="wrap">

    <div class="icon">…</div>
    <h1>Betalingsstatus <em>laden</em></h1>

</div>

    }, 1500);
  }
</script>
