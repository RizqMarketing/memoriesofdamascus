<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagina niet gevonden — Morgenland Kookt</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<style>
  :root {
    --ink:#160808; --gold:#c9942a; --gold-lt:#e8c46a;
    --cream:#f5edd6; --muted:#c4b49a; --divider:rgba(201,148,42,.18);
    --font-heading:'Cormorant Garamond','EB Garamond',Georgia,serif;
    --font-body:'Inter',system-ui,sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--ink);color:var(--cream);font-family:var(--font-body);min-height:100vh}
  .wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
  .number{font-family:var(--font-heading);font-style:italic;font-weight:400;font-size:clamp(7rem,18vw,12rem);color:var(--gold-lt);line-height:1;letter-spacing:.02em;margin-bottom:.5rem}
  .ar{font-family:'Amiri',serif;color:var(--gold);opacity:.5;font-size:1.4rem;margin-bottom:1.5rem;letter-spacing:.06em}
  h1{font-family:var(--font-heading);font-weight:400;font-size:clamp(1.5rem,3vw,2.2rem);color:var(--cream);margin-bottom:1rem}
  h1 em{color:var(--gold-lt);font-style:italic}
  p{color:var(--muted);max-width:480px;margin-bottom:2.5rem;line-height:1.7;font-size:.95rem}
  .btn{display:inline-block;padding:.9rem 2rem;border:1px solid var(--gold);color:var(--gold-lt);text-decoration:none;font-size:.85rem;letter-spacing:.16em;text-transform:uppercase;font-family:var(--font-body);font-weight:500;transition:all .2s}
  .btn:hover{background:var(--gold);color:var(--ink)}
  .ornament{margin:1.5rem 0;color:var(--gold);opacity:.4;font-size:1.3rem;letter-spacing:1rem}
</style>
</head>
<body>
<div class="wrap">
  <div class="ornament">✦ ✧ ✦</div>
  <div class="number">404</div>
  <div class="ar">صفحة غير موجودة</div>
  <h1>Deze pagina is <em>verdwaald</em></h1>
  <p>De pagina die u zoekt bestaat niet meer of is verplaatst. Geen zorgen — laten we u terugbrengen naar Morgenland Kookt.</p>
  <a href="/" class="btn">Terug naar home</a>
</div>
</body>
</html>
